name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Named simulator; OS is omitted so xcodebuild picks the newest eligible
  # runtime on the runner. Update the device if the runner image drops it.
  DESTINATION: platform=iOS Simulator,name=iPhone 17

jobs:
  build-and-test:
    name: Build + test (unsigned simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: xcodebuild -version

      # Signing is deferred until the Apple developer account is provisioned, so
      # everything runs against a simulator with code signing disabled (CLAUDE.md).
      # Compile-checks all three targets (app, extension, framework) plus the
      # UI-test bundle. A signed device/archive build is out of scope for now.
      - name: Build app + extension for testing
        run: |
          xcodebuild \
            -project IPAKeyboard.xcodeproj \
            -scheme IPAKeyboard \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build-for-testing

      - name: Build IPAKeyboardKit for testing
        run: |
          xcodebuild \
            -project IPAKeyboard.xcodeproj \
            -scheme IPAKeyboardKit \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing

      - name: Run IPAKeyboardKit unit tests
        run: |
          xcodebuild \
            -project IPAKeyboard.xcodeproj \
            -scheme IPAKeyboardKit \
            -destination "$DESTINATION" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
